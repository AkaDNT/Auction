services:
  postgres:
    image: postgres:16
    container_name: auction_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/auction/Auction/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: auction_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /opt/auction/Auction/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: ${REGISTRY_IMAGE}/api:${IMAGE_TAG}
    container_name: auction_api
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      PORT: 4000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:4000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    image: ${REGISTRY_IMAGE}/worker:${IMAGE_TAG}
    container_name: auction_worker
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ${REGISTRY_IMAGE}/web:${IMAGE_TAG}
    container_name: auction_web
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:stable
    container_name: auction_nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/auction/Auction/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/auction/Auction/nginx/certs/cloudflare-origin.crt:/etc/nginx/certs/cloudflare-origin.crt:ro
      - /opt/auction/Auction/nginx/certs/cloudflare-origin.key:/etc/nginx/certs/cloudflare-origin.key:ro
